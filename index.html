<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('https://avatars.mds.yandex.net/i?id=7a772733df57c750f72f1e7f1a902a08_l-8918938-images-thumbs&n=13');
            background-size: cover;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            color: white;
            text-align: center;
            padding: 20px;
            margin: auto;
            top: 50%;
            transform: translateY(-50%);
        }
        .arrow {
            cursor: pointer;
            transition: transform 0.3s;
        }
        .arrow:hover {
            transform: translateY(-5px);
        }
        .snow {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            animation: snow 10s linear infinite;
        }
        @keyframes snow {
            0% { top: -10%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>
    <div class="snow"></div>
    <div class="container">
        <h1>My Bio</h1>
        <p>Name: Ivan</p>
        <p>Number: +7...</p>
        <p>Search: 14</p>
        <div class="arrow" onclick="toggleMenu()">➡️</div>
    </div>
    <script>
        function toggleMenu() {
            // Code to open new menu with smooth transition
        }
    </script>
</body>
</html>
