<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bio</title>
    <style>
        body {
            background-image: url('https://avatars.mds.yandex.net/i?id=7a772733df57c750f72f1e7f1a902a08_l-8918938-images-thumbs&n=13');
            background-size: cover;
            color: white;
            font-family: Arial, sans-serif;
        }
        .bio {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin: 100px auto;
            width: 300px;
        }
        .menu {
            display: none;
            transition: all 0.5s;
        }
        .toggle-menu {
            cursor: pointer;
            color: lightblue;
        }
    </style>
</head>
<body>
    <div class="bio">
        <h1>My Bio</h1>
        <p>Number: +7...</p>
        <p>Name: Ivan</p>
        <p>Search: 14</p>
        <span class="toggle-menu" onclick="toggleMenu()">▶</span>
        <div class="menu" id="menu">
            <p>tg: @Toxka7744</p>
        </div>
        <button onclick="startGame()">Play Snake</button>
    </div>
    <script>
        function toggleMenu() {
            const menu = document.getElementById('menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }
        function startGame() {
            alert('Starting Snake Game...');
            // Game logic would go here
        }
    </script>
</body>
</html>
