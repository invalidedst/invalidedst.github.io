<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bio</title>
    <style>
        body {
            background: url('https://avatars.mds.yandex.net/i?id=7a772733df57c750f72f1e7f1a902a08_l-8918938-images-thumbs&n=13') no-repeat center center fixed;
            overflow: hidden;
            animation: snow 10s infinite;
        }
        @keyframes snow {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }
        .bio {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        .menu {
            display: none;
            transition: all 0.5s;
        }
        .toggle-menu:hover + .menu {
            display: block;
        }
    </style>
</head>
<body>
    <div class="bio">
        <h1>My Bio</h1>
        <p>Number: +7...</p>
        <p>Name: Ivan</p>
        <p>Search: 14</p>
        <div class="toggle-menu">🔽</div>
        <div class="menu">Contact: tg:@Toxka7744</div>
    </div>
</body>
</html>
