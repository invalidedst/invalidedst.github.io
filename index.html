<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя страница</title>
    <style>
        /* Общий стиль */
        body {
            font-family: Arial, sans-serif;
            background-image: url('https://avatars.mds.yandex.net/i?id');
            background-size: cover;
            background-position: center;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.7); /* Полупрозрачный черный фон */
            padding: 30px;
            border-radius: 10px;
            width: 300px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        ul {
            list-style-type: none;
            padding-left: 0;
        }

        li strong {
            color: #ffd700; /* Золотистый цвет для выделенного текста */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MY BIO</h1>
        <ul>
            <li><strong>TG:</strong> @Toxka7744</li>
            <li><strong>Телефон:</strong> +7#########*</li>
            <li><strong>Имя:</strong> Иван</li>
            <li><strong>Возраст:</strong> 15 лет</li>
        </ul>
    </div>
</body>
</html>
