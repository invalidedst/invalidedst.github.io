<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY BIO - Ivan</title>
    <style>
        body {
            background: url('https://github.com/invalidedst/invalidedst.github.io/raw/refs/heads/main/vid-20241228-203107-270_rjm60dvS.mp4') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
            font-family: 'Arial', sans-serif;
        }

        .bio-container {
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            position: relative;
            z-index: 1;
        }

        .bio-container h1 {
            color: white;
            font-size: 2.5em;
            margin: 0;
        }

        .bio-container p {
            color: white;
            font-size: 1.2em;
            margin: 5px 0;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 20px auto;
            border: 3px solid white;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .snowflake {
            position: absolute;
            color: white;
            font-size: 1em;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                top: -10%;
                opacity: 1;
            }
            100% {
                top: 100%;
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="bio-container">
        <img src="https://raw.githubusercontent.com/invalidedst/invalidedst.github.io/refs/heads/main/IMG_20241226_110253_469.jpg" alt="Avatar" class="avatar">
        <h1>MY BIO</h1>
        <p>Имя: Ivan</p>
        <p>Номер: +79515*****</p>
        <p>Возраст: 14</p>
        <p>Telegram: @Toxka7744</p>
    </div>

    <script>
        function createSnowflake() {
            const snowflake = document.createElement('div');
            snowflake.className = 'snowflake';
            snowflake.innerHTML = '❄'; // Символ снежинки
            snowflake.style.left = Math.random() * 100 + 'vw';
            snowflake.style.animationDuration = Math.random() * 3 + 2 + 's'; // Случайная продолжительность падения
            snowflake.style.fontSize = Math.random() * 1 + 0.5 + 'em'; // Случайный размер снежинки
            document.body.appendChild(snowflake);

            // Удаляем снежинку после падения
            setTimeout(() => {
                snowflake.remove();
            }, 5000);
        }

        setInterval(createSnowflake, 300); // Создаем снежинку каждые 300 мс
    </script>

</body>
</html>
