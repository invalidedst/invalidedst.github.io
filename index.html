<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bio</title>
    <style>
        body {
            background-image: url('https://avatars.mds.yandex.net/i?id=7a772733df57c750f72f1e7f1a902a08_l-8918938-images-thumbs&n=13');
            background-size: cover;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        .bio-container {
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 20px;
            width: 300px;
            margin: 100px auto;
            text-align: center;
            position: relative;
        }
        .arrow {
            cursor: pointer;
            transition: transform 0.3s;
        }
        .arrow:hover {
            transform: rotate(90deg);
        }
        .menu {
            display: none;
            margin-top: 10px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 10px;
        }
        .snowflake {
            position: absolute;
            top: -10px;
            left: 50%;
            opacity: 0.8;
            animation: fall 5s infinite;
        }
        @keyframes fall {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }
    </style>
</head>
<body>
    <div class="bio-container">
        <h1>My Bio</h1>
        <p>Name: Ivan</p>
        <p>Number: +7...</p>
        <p>Search: 14</p>
        <div class="arrow" onclick="toggleMenu()">➡️</div>
        <div class="menu" id="menu">
            <p>Contact: tg:@Toxka7744</p>
        </div>
        <div class="snowflake">❄️</div>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }
    </script>
</body>
</html>
