<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bio</title>
    <style>
        body {
            background-image: url("https://avatars.mds.yandex.net/i?id=7a772733df57c750f72f1e7f1a902a08_l-8918938-images-thumbs&n=13");
            background-size: cover;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .bio {
            background-color: black;
            color: red;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            position: absolute;
            top: 20px;
            z-index: 2;
        }
        @keyframes snow {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }
        .snowflake {
            position: absolute;
            top: -10px;
            color: white;
            font-size: 1em;
            animation: snow linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://raw.githubusercontent.com/invalidedst/invalidedst.github.io/refs/heads/main/IMG_20241226_110253_469.jpg" alt="Avatar" class="avatar">
        <div class="bio">
            <h1>My Bio</h1>
            <p>Number: +79515*****</p>
            <p>Name: Ivan</p>
            <p>Years: 14</p>
            <p>Telegram: @Toxka7744</p>
        </div>
        <script>
            for (let i = 0; i < 100; i++) {
                const snowflake = document.createElement('div');
                snowflake.className = 'snowflake';
                snowflake.innerHTML = '❄';
                snowflake.style.left = Math.random() * 100 + 'vw';
                snowflake.style.animationDuration = Math.random() * 3 + 2 + 's';
                document.body.appendChild(snowflake);
            }
        </script>
    </div>
</body>
</html>
