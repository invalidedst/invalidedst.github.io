<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bio</title>
    <style>
        body {
            background-image: url("https://avatars.mds.yandex.net/i?id=7a772733df57c750f72f1e7f1a902a08_l-8918938-images-thumbs&n=13");
            background-size: cover;
            overflow: hidden;
        }
        .bio-container {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            color: white;
            text-align: center;
            margin: auto;
            top: 50%;
            transform: translateY(-50%);
            padding: 20px;
            font-family: 'Arial', sans-serif;
        }
        .snowflake {
            position: absolute;
            color: white;
            font-size: 24px;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { top: -10%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>
    <div class="bio-container">
        <h1 style="font-family: 'Cursive', sans-serif;">MY BIO</h1>
        <p>Number: +79515*****<br>Name: Ivan<br>Years: 14<br>tg: @Toxka7744</p>
    </div>
    <script>
        for (let i = 0; i < 50; i++) {
            let snowflake = document.createElement('div');
            snowflake.className = 'snowflake';
            snowflake.innerHTML = '❄';
            snowflake.style.left = Math.random() * 100 + 'vw';
            snowflake.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(snowflake);
        }
    </script>
</body>
</html>
