<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bio</title>
    <style>
        body {
            background-image: url('https://avatars.mds.yandex.net/i?id=7a772733df57c750f72f1e7f1a902a08_l-8918938-images-thumbs&n=13');
            background-size: cover;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            color: white;
            text-align: center;
            padding: 20px;
            margin: auto;
            top: 50%;
            transform: translateY(-50%);
        }
        .snow {
            position: absolute;
            width: 5px;
            height: 5px;
            background-color: white;
            border-radius: 50%;
            animation: fall 3s infinite;
        }
        @keyframes fall {
            0% { top: -10px; }
            100% { top: 100%; }
        }
        .arrow {
            cursor: pointer;
            transition: transform 0.3s;
        }
        .arrow:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Bio</h1>
        <p>Name: Ivan</p>
        <p>Number: +7...</p>
        <p>Search: 14</p>
        <div class="arrow" onclick="toggleMenu()">➡️</div>
        <div id="menu" style="display:none;">
            <p>tg:@Toxka7744</p>
        </div>
    </div>
    <script>
        function toggleMenu() {
            const menu = document.getElementById('menu');
            menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        }
    </script>
    <script>
        for (let i = 0; i < 50; i++) {
            const snowflake = document.createElement('div');
            snowflake.className = 'snow';
            snowflake.style.left = Math.random() * window.innerWidth + 'px';
            document.body.appendChild(snowflake);
        }
    </script>
</body>
</html>
