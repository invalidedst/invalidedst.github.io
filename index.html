<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('https://avatars.mds.yandex.net/i?id=7a772733df57c750f72f1e7f1a902a08_l-8918938-images-thumbs&n=13');
            background-size: cover;
            overflow: hidden;
        }
        .snow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .bio-container {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            color: white;
            text-align: center;
            padding: 20px;
            margin: auto;
            top: 50%;
            transform: translateY(-50%);
            z-index: 2;
        }
        .menu {
            display: none;
            background-color: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            padding: 10px;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
        }
        .arrow {
            cursor: pointer;
        }
        .arrow:hover + .menu {
            display: block;
            transition: all 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="snow"></div>
    <div class="bio-container">
        <h1>My Bio</h1>
        <p>Number: +7...</p>
        <p>Name: Ivan</p>
        <p>earch: 14</p>
        <div class="arrow">➡️</div>
        <div class="menu">
            <p>Contact: tg:@Toxka7744</p>
        </div>
    </div>
    <script>
        // Snow animation
        const snowContainer = document.querySelector('.snow');
        for (let i = 0; i < 100; i++) {
            const snowflake = document.createElement('div');
            snowflake.className = 'snowflake';
            snowflake.style.position = 'absolute';
            snowflake.style.backgroundColor = 'white';
            snowflake.style.borderRadius = '50%';
            snowflake.style.width = Math.random() * 5 + 'px';
            snowflake.style.height = snowflake.style.width;
            snowflake.style.left = Math.random() * 100 + 'vw';
            snowflake.style.animationDuration = Math.random() * 3 + 2 + 's';
            snowflake.style.opacity = Math.random();
            snowContainer.appendChild(snowflake);
        }
    </script>
</body>
</html>
