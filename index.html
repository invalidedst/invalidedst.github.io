<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bio</title>
    <style>
        body {
            background-image: url('https://avatars.mds.yandex.net/i?id=7a772733df57c750f72f1e7f1a902a08_l-8918938-images-thumbs&n=13');
            background-size: cover;
            overflow: hidden;
            position: relative;
        }
        .snowflake {
            position: absolute;
            top: -10%;
            color: white;
            font-size: 1em;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { top: -10%; }
            100% { top: 100%; }
        }
        .bio-container {
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            border-radius: 15px;
            padding: 20px;
            width: 300px;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Arial', sans-serif;
        }
        .hat {
            font-size: 1.5em;
            position: relative;
            top: -20px;
        }
    </style>
</head>
<body>
    <div class="bio-container">
        <div class="hat">🎩</div>
        <h1>MY BIO</h1>
        <p>Number: +79515*****</p>
        <p>Name: Ivan</p>
        <p>Years: 14</p>
        <p>tg: @Toxka7744</p>
    </div>
    <script>
        for (let i = 0; i < 50; i++) {
            let snowflake = document.createElement('div');
            snowflake.className = 'snowflake';
            snowflake.innerHTML = '❄';
            snowflake.style.left = Math.random() * 100 + 'vw';
            snowflake.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(snowflake);
        }
    </script>
</body>
</html>
